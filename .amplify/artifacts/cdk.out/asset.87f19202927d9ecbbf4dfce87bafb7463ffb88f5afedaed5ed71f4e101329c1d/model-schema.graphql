type User @model @auth(rules: [{allow: owner, operations: [read, update], ownerField: "owner"}])
{
  name: String!
  email: String!
  role: String!
}

type Todo @model @auth(rules: [{allow: owner, ownerField: "owner"}])
{
  content: String
}

type Business @model @auth(rules: [{allow: owner, operations: [create, read, update], ownerField: "owner"},
  {allow: public, provider: iam, operations: [create, read]},
  {allow: private, operations: [create, read, update]}])
{
  businessName: String!
  legalBusinessName: String
  businessType: String
  contactName: String!
  contactEmail: String!
  ownerId: String
  phone: String
  website: String
  description: String
  street: String
  city: String
  state: String
  zip: String
  images: [String]
  tags: [String]
  categories: [String]
  averageRating: Float
  verified: Boolean
  verificationDocumentKey: String
  verificationStatus: String!
  verificationSubmittedAt: AWSDateTime
}